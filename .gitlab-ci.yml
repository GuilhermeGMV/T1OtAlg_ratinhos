stages:
  - mirror

mirror_to_github:
  stage: mirror
  image: alpine:latest
  before_script:
    - apk add --no-cache git
  script:
    - git remote add github https://$GITHUB_TOKEN@github.com/GuilhermeGMV/T1OtAlg_ratinhos.git
    - git push github HEAD:$CI_COMMIT_REF_NAME
    - git push github --tags
  only:
    - branches